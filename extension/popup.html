<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h2 {
      font-size: 15px;
      margin-bottom: 12px;
      text-align: center;
      color: #fff;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    label { font-size: 12px; min-width: 56px; }
    select, input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    input::placeholder { color: #666; }
    .apikey-row {
      display: none;
      margin-bottom: 8px;
    }
    .apikey-row.show { display: flex; }
    #apikey-toggle {
      font-size: 11px;
      color: #666;
      cursor: pointer;
      text-align: center;
      margin-bottom: 8px;
    }
    #apikey-toggle:hover { color: #aaa; }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #translate-btn {
      background: #0f3460;
      color: #e0e0e0;
      margin-top: 4px;
    }
    #translate-btn:hover:not(:disabled) { background: #1a4a8a; }
    #restore-btn {
      background: transparent;
      color: #888;
      border: 1px solid #444;
      margin-top: 6px;
    }
    #restore-btn:hover:not(:disabled) { color: #e0e0e0; border-color: #888; }
    #status {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
    }
    #status.success { color: #4caf50; }
    #status.error { color: #f44336; }
    .progress-bar {
      height: 3px;
      background: #333;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    .progress-bar-inner {
      height: 100%;
      background: #4caf50;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <h2>沉浸式翻译</h2>
  <div class="row">
    <label>目标语言</label>
    <select id="lang">
      <option value="Chinese">中文</option>
      <option value="English">English</option>
      <option value="Japanese">日本語</option>
      <option value="Korean">한국어</option>
      <option value="French">Français</option>
      <option value="German">Deutsch</option>
      <option value="Spanish">Español</option>
    </select>
  </div>
  <div id="apikey-toggle">设置 API Key ▾</div>
  <div class="apikey-row" id="apikey-row">
    <label>API Key</label>
    <input type="password" id="apikey" placeholder="sk-...">
  </div>
  <button id="translate-btn">翻译页面</button>
  <button id="restore-btn">恢复原文</button>
  <div class="progress-bar" id="progress-bar">
    <div class="progress-bar-inner" id="progress-inner"></div>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
